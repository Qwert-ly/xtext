<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f7f3ee" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1c1a17" media="(prefers-color-scheme: dark)">
    <meta property="og:title" content="上古汉语字典查询">
    <meta property="og:type" content="website">
    <meta name="description" content="新最小上古漢語（NOCM）查詢工具，支持漢字、拼音、上古擬音、諧聲域多模式檢索">
    <meta property="og:description" content="新最小上古漢語（NOCM）查詢工具，支持多模式檢索與上古音擬音查詢">
    <meta property="og:url" content="https://qwert-ly.github.io/xtext/">
    <link rel="canonical" href="https://qwert-ly.github.io/xtext/">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="application-name" content="NOCM 查詢">
    <meta name="apple-mobile-web-app-title" content="NOCM 查詢">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>上古漢語字典查詢</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📜</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="preload" href="base.json.gz" as="fetch" crossorigin="anonymous">
</head>
<body>
    <header class="page-header">
        <h1>
            <a href="https://zhuanlan.zhihu.com/p/12987993957" target="_blank" rel="noopener noreferrer">
                新最小上古漢語（NOCM）查詢
            </a>
        </h1>
    </header>

    <section class="search-container" role="search">
        <div class="search-box">
            <label for="searchInput" class="sr-only">搜索上古漢語字典</label>
            <input type="text" id="searchInput" placeholder="正在加載字庫…"
                   disabled
                   aria-label="搜索上古漢語字典"
                   aria-describedby="searchModeDesc"
                   autocomplete="off" spellcheck="false" maxlength="100"
                   title="按'/'快速回到搜索框">
            <button id="searchBtn" type="button" disabled aria-label="查詢">查詢</button>
        </div>
        <div class="search-options" role="group" aria-labelledby="searchModeDesc">
            <span id="searchModeDesc" class="sr-only">選擇搜索模式</span>
            <label class="radio-label">
                <input type="radio" name="searchMode" value="default" checked aria-label="默認模式：自動分詞查詢">
                <span class="radio-btn">默認</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="searchMode" value="exact" aria-label="精確模式：完整符合搜索">
                <span class="radio-btn">精確</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="searchMode" value="regex" aria-label="正則模式：使用正規表達式搜索">
                <span class="radio-btn">正則</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="searchMode" value="meaning" aria-label="釋義反查模式：從釋義文字反向查詢">
                <span class="radio-btn">釋義反查</span>
            </label>
        </div>
    </section>

    <div id="updateBar" role="alert" aria-live="polite">
        <span>🔄 字庫有新版本已下載至本地，重新載入即可使用</span>
        <div class="update-actions">
            <button id="reloadBtn" class="btn-reload" type="button">重新載入</button>
            <button id="dismissUpdateBtn" class="btn-dismiss" type="button" aria-label="關閉提示">✕</button>
        </div>
    </div>

    <div id="extraStatus" role="status" aria-live="polite"></div>
    <div id="regexError" role="alert" aria-live="assertive"></div>

    <main id="results" aria-live="polite" aria-label="查詢結果"></main>

    <script src="script.js" defer></script>
</body>
</html>
