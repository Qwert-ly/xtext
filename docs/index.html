    <style>
        :root {
            color-scheme: light dark;
            --ink: #1c1a17; --ink-soft: #4a4540; --ink-faint: #8a837a;
            --paper: #f7f3ee; --paper-card: #fdfaf6; --paper-inset: #f0ebe3;
            --vermilion: #c0392b; --vermilion-light: #f5e6e4;
            --indigo: #2c3e6b; --indigo-light: #e8ecf5;
            --gold: #8b6914; --gold-light: #f5eed8;
            --border: #d6cfc5; --border-light: #e8e2d8;
        }

        /* 暗色模式 */
        @media (prefers-color-scheme: dark) {
            :root {
                --ink: #e8e2d8; --ink-soft: #a8a095; --ink-faint: #7a736a;
                --paper: #1c1a17; --paper-card: #25221e; --paper-inset: #141210;
                --vermilion: #d94b3a; --vermilion-light: #3a1c18;
                --indigo: #6b84c4; --indigo-light: #1e2638;
                --gold: #c2a153; --gold-light: #302612;
                --border: #4a4540; --border-light: #36322d;
            }
            body {
                background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='60' height='60' fill='%231c1a17'/%3E%3Crect x='0' y='29.5' width='60' height='1' fill='%2336322d' opacity='0.5'/%3E%3Crect x='29.5' y='0' width='1' height='60' fill='%2336322d' opacity='0.5'/%3E%3C/svg%3E");
            }
            input[type="text"] { color: var(--ink); }
            button:disabled { background: var(--ink-soft); }
            .annotation-link {
                color: #8cb4ff;
                border-bottom-color: rgba(140, 180, 255, 0.4);
            }
            .annotation-link:hover {
                color: var(--gold);
                border-bottom-color: var(--gold);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Noto Serif TC", "PingFang TC", "STSong", serif; background-color: var(--paper);
            color: var(--ink); max-width: 820px; margin: 0 auto; padding: 32px 24px; line-height: 1.8;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='60' height='60' fill='%23f7f3ee'/%3E%3Crect x='0' y='29.5' width='60' height='1' fill='%23e8e2d8' opacity='0.5'/%3E%3Crect x='29.5' y='0' width='1' height='60' fill='%23e8e2d8' opacity='0.5'/%3E%3C/svg%3E");
            min-height: 100vh;
        }
        .page-header { text-align: center; margin-bottom: 36px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
        .page-header::after { content: ''; display: block; width: 60px; height: 2px; background: var(--vermilion); margin: 12px auto 0; }
        .page-header h1 { font-size: 26px; font-weight: 500; letter-spacing: 0.15em; color: var(--indigo); }
        .page-header h1 a:hover { color: var(--vermilion); }
        .search-container { position: sticky; top: env(safe-area-inset-top, 0); background: var(--paper); padding: 12px 0 16px; z-index: 100; margin-bottom: 12px; }
        @supports (backdrop-filter: blur(8px)) {
            .search-container { background: color-mix(in srgb, var(--paper) 94%, transparent); backdrop-filter: blur(8px); }
        }
        .search-box { display: flex; border: 1.5px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--paper-card); box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: border-color 0.2s, box-shadow 0.2s; }
        .search-box:focus-within { border-color: var(--indigo); box-shadow: 0 2px 16px rgba(44,62,107,0.12); }
        .search-options { display: flex; gap: 10px; margin-top: 14px; justify-content: center; flex-wrap: wrap; }
        .radio-label { cursor: pointer; display: inline-flex; }
        .radio-label input {
          position: absolute;
          opacity: 0;
          width: 1px;
          height: 1px;
        }
        .radio-btn { padding: 6px 18px; font-size: 13px; font-weight: 500; border: 1.5px solid var(--border); border-radius: 20px; color: var(--ink-soft); transition: all 0.2s ease; background: var(--paper-card); letter-spacing: 0.05em; }
        .radio-label:hover .radio-btn { border-color: var(--indigo-light); color: var(--indigo); }
        .radio-label input:checked + .radio-btn { background: var(--indigo); color: #fff; border-color: var(--indigo); box-shadow: 0 2px 8px rgba(44,62,107,0.2); }
        .radio-label input:focus-visible + .radio-btn { outline: 2px solid var(--indigo); outline-offset: 2px; }

        input[type="text"] { flex: 1; padding: 13px 16px; font-size: 15px; font-family: inherit; border: none; background: transparent; outline: none; min-width: 0; }
        input[type="text"]::placeholder { color: var(--ink-faint); }
        button { padding: 12px 20px; font-size: 14px; font-family: inherit; letter-spacing: 0.1em; cursor: pointer; background: var(--indigo); color: #fff; border: none; transition: background 0.2s, transform 0.1s; white-space: nowrap; }
        button:active { transform: scale(0.97); }
        button:hover { background: #1e2b4e; }
        button:disabled { cursor: not-allowed; opacity: 0.7; }

        #updateBar {
            display: none; align-items: center; justify-content: space-between; gap: 12px;
            margin-bottom: 20px; padding: 10px 16px;
            background: var(--indigo-light); color: var(--indigo);
            border: 1px solid rgba(44,62,107,0.2); border-radius: 4px;
            font-size: 13.5px; letter-spacing: 0.05em;
            animation: fadeUp 0.3s ease both;
        }
        #updateBar .update-actions { display: flex; gap: 8px; flex-shrink: 0; }
        #updateBar .btn-reload { padding: 4px 14px; font-size: 12px; font-family: inherit; background: var(--indigo); color: #fff; border: none; border-radius: 3px; cursor: pointer; letter-spacing: 0.08em; transition: background 0.2s; }
        #updateBar .btn-reload:hover { background: #1e2b4e; }
        #updateBar .btn-dismiss { padding: 4px 10px; font-size: 12px; font-family: inherit; background: transparent; color: var(--indigo); border: 1px solid var(--indigo); border-radius: 3px; cursor: pointer; }
        #updateBar .btn-dismiss:hover { background: rgba(44,62,107,0.08); }

        #extraStatus { text-align: center; font-size: 13px; color: var(--gold); margin-bottom: 24px; display: none; }
        .result-card { background: var(--paper-card); margin-bottom: 28px; border-radius: 4px; border: 1px solid var(--border); box-shadow: 0 3px 20px rgba(0,0,0,0.05); overflow: hidden; animation: fadeUp 0.35s ease both; transition: box-shadow 0.25s ease, transform 0.2s ease; content-visibility: auto; contain-intrinsic-size: 260px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .char-glyph-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
        .char-glyph { font-size: 64px; font-weight: 700; line-height: 1; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.3); user-select: text; }
        .zi-link { font-size: 11px; color: rgba(255,255,255,0.5); text-decoration: none; letter-spacing: 0.06em; border-bottom: 1px dashed rgba(255,255,255,0.3); transition: color 0.2s, border-color 0.2s; white-space: nowrap; }
        .zi-link:hover { color: #f0c27f; border-bottom-color: #f0c27f; }
        .char-phonetics { flex: 1 1 240px; min-width: 0; }
        .phonetic-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
        .phonetic-label { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; width: 28px; flex-shrink: 0; }
        .phonetic-value { font-family: "Noto Sans Mono", monospace; font-size: 18px; color: #f0c27f; letter-spacing: 0.05em; word-break: break-all; }
        .pinyin-value { font-family: "Noto Sans Mono", monospace; font-size: 14px; color: rgba(255,255,255,0.75); letter-spacing: 0.05em; word-break: break-all; }
        .char-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }

        .xiesheng-tag { background: rgba(240, 194, 127, 0.2); color: #f0c27f; border-color: rgba(240, 194, 127, 0.4); cursor: pointer; transition: all 0.2s; }
        .xiesheng-tag:hover { background: rgba(240, 194, 127, 0.4); transform: translateY(-1px); }
        .card-body { padding: 18px 24px; }
        .section { margin-bottom: 16px; }
        .section:last-child { margin-bottom: 0; }
        .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--ink-faint); text-transform: uppercase; }
        .section-note { font-size: 12px; color: var(--ink-faint); margin-left: 4px; }
        .section-divider { height: 1px; background: var(--border-light); margin: 16px 0; }
        .meanings-list { list-style: none; }
        .meanings-list li { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 8px; font-size: 14.5px; line-height: 1.9; color: var(--ink); }
        .sense-num {
            min-width: 20px;
            height: 20px;
            background: var(--vermilion);

            justify-content: center;

        .text-block { background: var(--paper-inset); border: 1px solid var(--border-light); border-left: 3px solid var(--border); border-radius: 0 3px 3px 0; padding: 10px 14px; font-size: 13.5px; line-height: 1.9; color: var(--ink-soft); white-space: pre-wrap; word-break: break-word; }
        .text-block.annotation { border-left-color: var(--gold); background: var(--gold-light); color: var(--ink); }
        .no-result { text-align: center; padding: 48px 0; color: var(--ink-faint); font-size: 15px; letter-spacing: 0.05em; }
        .pagination-bar {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            margin: 0 0 20px; padding: 12px 14px;
            background: var(--paper-card); border: 1px solid var(--border); border-radius: 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04); color: var(--ink-soft);
            font-size: 13px; letter-spacing: 0.04em; flex-wrap: wrap;
        }
        .pagination-bar.bottom { margin: 8px 0 0; }
        .pagination-summary { color: var(--ink-soft); }
        .pagination-controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .pagination-controls button,
        .pagination-size select {
            font-family: inherit; font-size: 12px; letter-spacing: 0.04em; border-radius: 4px;
            border: 1px solid var(--border); background: var(--paper-card); color: var(--ink-soft);
        }
        .pagination-controls button { padding: 5px 9px; cursor: pointer; transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .pagination-controls button:hover:not(:disabled) { border-color: var(--indigo); color: var(--indigo); background: var(--indigo-light); }
        .pagination-controls button:disabled { background: var(--paper-inset); color: var(--ink-faint); border-color: var(--border-light); cursor: not-allowed; opacity: 0.75; }
        .pagination-controls button[aria-current="page"] { background: var(--indigo); color: #fff; border-color: var(--indigo); cursor: default; }
        .pagination-ellipsis { padding: 0 2px; color: var(--ink-faint); }
        .pagination-size { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
        .pagination-size select { padding: 4px 24px 4px 8px; cursor: pointer; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
        .copy-btn {
            background: transparent; border: none; cursor: pointer;
            font-size: 14px; padding: 4px 6px; border-radius: 4px; transition: background 0.2s; color: inherit;

        .copy-btn:hover { background: rgba(255,255,255,0.15); }
        .export-btn {

            border: 1px solid rgba(255,255,255,0.3);

            font-size: 12px;

            border-color: #fff;

        .annotation-link {

            color: var(--vermilion);
            border-bottom-color: var(--vermilion);

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: 0.01ms !important; }
            .result-card:hover { transform: none; }
        }

        @media (max-width: 640px) {

            .page-header h1 { font-size: 22px; letter-spacing: 0.1em; }
            .search-container { padding: 8px 0 12px; }
            .search-box { border-radius: 3px; }
            input[type="text"] { padding: 10px 12px; font-size: 14px; }
            button { padding: 10px 16px; font-size: 13px; }
            .search-options { gap: 6px; margin-top: 10px; }
            .radio-btn { padding: 4px 12px; font-size: 12px; border-radius: 16px; }

            .char-banner { padding: 14px 18px; gap: 12px; }
            .char-glyph { font-size: 48px; }
            .phonetic-value { font-size: 16px; }
            .pinyin-value { font-size: 13px; }
            .export-btn { margin-left: 0; margin-top: 8px; width: 100%; text-align: center; }

            .card-body { padding: 12px 16px; }
            .meanings-list li { font-size: 13.5px; gap: 8px; }
            .sense-num { min-width: 18px; height: 18px; font-size: 10px; margin-top: 3px; }
            .text-block { padding: 8px 10px; font-size: 12.5px; }

            .no-result { padding: 36px 0; font-size: 14px; }
            .pagination-bar { align-items: stretch; flex-direction: column; gap: 10px; padding: 10px 12px; }

            #updateBar { flex-direction: column; align-items: flex-start; gap: 8px; padding: 8px 12px; }

        @media (max-width: 380px) {

            .pinyin-value { font-size: 12px; }
            .search-options { gap: 4px; }
            .radio-btn { padding: 3px 10px; font-size: 11px; }
        }

<body>
    <header class="page-header">
        <h1>
            <a href="https://zhuanlan.zhihu.com/p/12987993957" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none; transition: color 0.2s;">
                新最小上古漢語（NOCM）查詢
            </a>
        </h1>
    </header>

    <section class="search-container" role="search">
        <div class="search-box">
            <label for="searchInput" class="sr-only">搜索上古漢語字典</label>
            <input type="text" id="searchInput" placeholder="正在加載字庫…"
                   onkeydown="handleEnter(event)" disabled
                   aria-label="搜索上古漢語字典"
                   aria-describedby="searchModeDesc"
                   autocomplete="off" spellcheck="false" maxlength="100"
                   title="按'/'快速回到搜索框">
            <button id="searchBtn" type="button" onclick="searchDict()" disabled aria-label="查詢">查詢</button>
        </div>
        <div class="search-options" role="group" aria-labelledby="searchModeDesc">
            <span id="searchModeDesc" class="sr-only">選擇搜索模式</span>
            <label class="radio-label">
                <input type="radio" name="searchMode" value="default" checked aria-label="默認模式：自動分詞查詢" onchange="searchDict()">
                <span class="radio-btn">默認</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="searchMode" value="exact" aria-label="精確模式：完整符合搜索" onchange="searchDict()">
                <span class="radio-btn">精確</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="searchMode" value="regex" aria-label="正則模式：使用正規表達式搜索" onchange="searchDict()">
                <span class="radio-btn">正則</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="searchMode" value="meaning" aria-label="釋義反查模式：從釋義文字反向查詢" onchange="searchDict()">
                <span class="radio-btn">釋義反查</span>
            </label>
        </div>
    </section>

    <div id="updateBar" role="alert" aria-live="polite">
        <span>🔄 字庫有新版本已下載至本地，重新載入即可使用</span>
        <div class="update-actions">
            <button class="btn-reload" type="button" onclick="location.reload()">重新載入</button>
            <button class="btn-dismiss" type="button"
                    onclick="document.getElementById('updateBar').style.display='none'"
                    aria-label="關閉提示">✕</button>
        </div>
    </div>

    <div id="extraStatus" role="status" aria-live="polite"></div>
    <div id="regexError" role="alert" aria-live="assertive" style="display:none; text-align:center; margin-bottom:16px; padding:10px 16px; background:var(--vermilion-light); color:var(--vermilion); border:1px solid rgba(192,57,43,0.2); border-radius:4px; font-size:13.5px; letter-spacing:0.05em;"></div>

    <main id="results" aria-live="polite" aria-label="查詢結果"></main>

    <script>
        let dictData = [];
        const meaningIndex = new Map();
        const zIndex = new Map();
        const pinyinIndex = new Map();
        const phoneticIndex = new Map();
        const domainExactIndex = new Map();
        const DICT_CACHE = 'nocm-dict-v2';
        const supportsGzipStreams = 'DecompressionStream' in window && 'TextDecoderStream' in window;
        let _updatedFiles = false;

        // 全域快捷鍵：按下 / 快速 focus 搜尋框
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        function escapeHtml(unsafe) {
            if (typeof unsafe !== 'string') return unsafe;
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function escapeJS(str) {
            if (!str) return '';
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        let updateNotified = false;
        function showUpdateNotification() {
            if (updateNotified) return;
            updateNotified = true;
            const bar = document.getElementById('updateBar');
            if (bar) bar.style.display = 'flex';
        }

        function addToIndex(index, key, item) {
            if (!key) return;
            const normalized = String(key).trim();
            if (!normalized) return;
            if (!index.has(normalized)) index.set(normalized, []);
            index.get(normalized).push(item);
        }

        function buildBaseIndexes() {
            zIndex.clear();
            pinyinIndex.clear();
            phoneticIndex.clear();
            domainExactIndex.clear();

            dictData.forEach(item => {
                addToIndex(zIndex, item.z, item);
                addToIndex(pinyinIndex, item.p, item);
                addToIndex(phoneticIndex, item.y, item);
                addToIndex(domainExactIndex, item.a, item);
            });
        }

        function appendUnique(target, seen, items) {
            if (!items) return;
            items.forEach(item => {
                if (!seen.has(item)) {
                    seen.add(item);
                    target.push(item);
                }
            });
        }

        function regexMatches(regex, ...values) {
            return values.some(value => {
                if (!value) return false;
                regex.lastIndex = 0;
                return regex.test(value);
            });
        }

        async function streamAndParseGz(response, progressCallback) {
            const contentLength = response.headers.get('content-length');
            const total = contentLength ? parseInt(contentLength, 10) : 0;
            let loaded = 0;

            const progressStream = new TransformStream({
                transform(chunk, controller) {
                    loaded += chunk.byteLength;
                    if (progressCallback) progressCallback(loaded, total);
                    controller.enqueue(chunk);
                }
            });

            const decompressedStream = response.body
                .pipeThrough(progressStream)
                .pipeThrough(new DecompressionStream('gzip'))
                .pipeThrough(new TextDecoderStream());

            const reader = decompressedStream.getReader();
            const chunks = [];
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
            }
            return JSON.parse(chunks.join(''));
        }

        async function fetchGzJson(url, progressCallback) {
            if (!supportsGzipStreams) throw new Error('此瀏覽器不支持DecompressionStream，無法直接讀取.json.gz。需要Chrome 80+/Firefox 113+/Safari 16.4+');

            const fetchFromNetwork = async () => {
                const resp = await fetch(url, { cache: 'no-cache' });
                if (!resp.ok) throw new Error(`請求${url}失敗`);

                const respForCache = ('caches' in window) ? resp.clone() : null;
                const data = await streamAndParseGz(resp, progressCallback);

                if (respForCache) {
                    const cache = await caches.open(DICT_CACHE);
                    await cache.put(url, respForCache);
                }
                return { data, fromCache: false };
            };

            if (!('caches' in window)) return fetchFromNetwork();

            const cache = await caches.open(DICT_CACHE);
            const cachedResp = await cache.match(url);

            if (cachedResp) {
                (async () => {
                    try {
                        const etag = cachedResp.headers.get('ETag');
                        const lastMod = cachedResp.headers.get('Last-Modified');
                        const condHeaders = {};
                        if (etag) condHeaders['If-None-Match'] = etag;
                        if (lastMod) condHeaders['If-Modified-Since'] = lastMod;

                        const netResp = await fetch(url, { cache: 'no-cache', headers: condHeaders });

                        if (netResp.ok) {
                            const newEtag = netResp.headers.get('ETag');
                            const newLastMod = netResp.headers.get('Last-Modified');

                            if (etag && newEtag && etag === newEtag) return;
                            if (lastMod && newLastMod && lastMod === newLastMod) return;

                            const oldLen = cachedResp.headers.get('Content-Length');
                            const newLen = netResp.headers.get('Content-Length');
                            if (!newEtag && !newLastMod && oldLen && newLen && oldLen === newLen) return;

                            await cache.put(url, netResp);
                            if (!_updatedFiles) {
                                _updatedFiles = true;
                                showUpdateNotification();
                            }
                        }
                    } catch (_e) { console.warn(`${url}背景更新檢查失敗:`, _e); }
                })();
                const data = await streamAndParseGz(cachedResp.clone(), progressCallback);
                return { data, fromCache: true };
            }

            return fetchFromNetwork();
        }

        const REGEX_MAX_LEN = 100;
        const REDOS_PATTERN = /(\(.*\*.*\*|\(.*\+.*\+|\(\?=.*\*|\(\?!.*\*|(\.\*){3,}|\(\w+\+\)\+|\(\w+\*\)\+)/;

        function safeRegex(str, flags = "") {
            if (str.length > REGEX_MAX_LEN) return { ok: false, msg: `正則表達式過長（${str.length}/${REGEX_MAX_LEN}字元）` };
            if (REDOS_PATTERN.test(str)) return { ok: false, msg: '正則表達式含有可能造成卡頓的模式，已拒絕執行' };
            try {
                const safeFlags = Array.from(new Set(flags.replace(/g/g, '').split(''))).join('');
                const r = new RegExp(str, safeFlags);
                return { ok: true, regex: r };
            } catch(e) {
                return { ok: false, msg: `正則語法錯誤：${e.message}` };
            }
        }

        function parseLinks(text) {
            if (!text) return text;
            const urlRegex = /((https?:\/\/)?(?:www\.)?[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(?:\/[^\s（）()，。；：「」『』、]*)?)/g;

            return text.replace(urlRegex, function(url) {
                let cleanUrl = url.replace(/[.,?!)\]]+$/, '');
                let href = cleanUrl.startsWith('http') ? cleanUrl : 'https://' + cleanUrl;
                return `<a href="${href}" target="_blank" rel="noopener" class="annotation-link">${cleanUrl}</a>`;
            });
        }

        const DEFAULT_PAGE_SIZE = 50;
        const PAGE_SIZE_OPTIONS = [20, 50, 100, 200];
        const PAGE_SIZE_STORAGE_KEY = 'nocm-page-size';
        let currentResults = [];
        let currentQuery = '';
        let currentMode = 'default';
        let currentPage = 1;
        let pendingUrlPage = 1;
        let pageSize = readStoredPageSize();

        function normalizePageSize(value) {
            const parsed = parseInt(value, 10);
            return PAGE_SIZE_OPTIONS.includes(parsed) ? parsed : DEFAULT_PAGE_SIZE;
        }

        function readStoredPageSize() {
            try {
                return normalizePageSize(localStorage.getItem(PAGE_SIZE_STORAGE_KEY) || DEFAULT_PAGE_SIZE);
            } catch (_e) {
                return DEFAULT_PAGE_SIZE;
            }
        }

        function persistPageSize(value) {
            try { localStorage.setItem(PAGE_SIZE_STORAGE_KEY, String(value)); } catch (_e) {}
        }

        function updateSearchUrl() {
            const url = new URL(window.location);
            if (currentQuery) {
                url.searchParams.set('q', currentQuery);
                url.searchParams.set('mode', currentMode);
                if (currentPage > 1) url.searchParams.set('page', String(currentPage));
                else url.searchParams.delete('page');
                if (pageSize !== DEFAULT_PAGE_SIZE) url.searchParams.set('size', String(pageSize));
                else url.searchParams.delete('size');
            } else {
                url.searchParams.delete('q');
                url.searchParams.delete('mode');
                url.searchParams.delete('page');
                url.searchParams.delete('size');
            }
            if (window.location.search !== url.search) window.history.pushState({}, '', url);
        }

        function pageWindow(page, totalPages) {
            const pages = new Set([1, totalPages]);
            for (let p = page - 2; p <= page + 2; p++) {
                if (p >= 1 && p <= totalPages) pages.add(p);
            }
            return Array.from(pages).sort((a, b) => a - b);
        }

        function createPageButton(label, page, disabled = false, current = false) {

            btn.addEventListener('click', () => {

            return btn;

        function createPaginationBar(total, position = 'top') {
            const totalPages = Math.max(1, Math.ceil(total / pageSize));
            const start = (currentPage - 1) * pageSize + 1;
            const end = Math.min(total, currentPage * pageSize);
            const bar = document.createElement('nav');
            bar.className = `pagination-bar ${position}`;
            bar.setAttribute('aria-label', position === 'top' ? '查詢結果分頁' : '查詢結果底部分頁');

            const summary = document.createElement('div');
            summary.className = 'pagination-summary';
            summary.innerHTML = `找到<b>${total}</b>條，顯示<b>${start}–${end}</b>條 / 第<b>${currentPage}</b>頁，共<b>${totalPages}</b>頁`;
            bar.appendChild(summary);

            const controls = document.createElement('div');
            controls.className = 'pagination-controls';

            const sizeLabel = document.createElement('label');
            sizeLabel.className = 'pagination-size';
            sizeLabel.textContent = '每頁';
            const select = document.createElement('select');
            select.setAttribute('aria-label', '每頁顯示條數');
            PAGE_SIZE_OPTIONS.forEach(size => {
                const option = document.createElement('option');
                option.value = String(size);
                option.textContent = `${size}條`;
                option.selected = size === pageSize;
                select.appendChild(option);
            });
            select.addEventListener('change', () => changePageSize(select.value));
            sizeLabel.appendChild(select);
            controls.appendChild(sizeLabel);

            if (totalPages > 1) {
                controls.appendChild(createPageButton('首頁', 1, currentPage === 1));
                controls.appendChild(createPageButton('上一頁', currentPage - 1, currentPage === 1));

                let last = 0;
                pageWindow(currentPage, totalPages).forEach(page => {
                    if (page - last > 1) {
                        const ellipsis = document.createElement('span');
                        ellipsis.className = 'pagination-ellipsis';
                        ellipsis.textContent = '…';
                        controls.appendChild(ellipsis);
                    }
                    controls.appendChild(createPageButton(String(page), page, false, page === currentPage));
                    last = page;
                });

                controls.appendChild(createPageButton('下一頁', currentPage + 1, currentPage === totalPages));
                controls.appendChild(createPageButton('末頁', totalPages, currentPage === totalPages));
            }

            bar.appendChild(controls);
            return bar;
        }

        function renderPaginatedResults(updateUrl = true, shouldScroll = false) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.replaceChildren();

            if (!currentQuery) return;

            if (currentResults.length === 0) {
                resultsDiv.setAttribute('aria-label', '查詢結果：無結果');
                resultsDiv.innerHTML = `<div class="no-result" role="status">未找到「${escapeHtml(currentQuery)}」的相關條目<br><span style="font-size:0.9em">可嘗試輸入單個漢字、拼音、諧聲域或使用正則</span></div>`;
                if (updateUrl) updateSearchUrl();
                return;
            }

            const totalPages = Math.max(1, Math.ceil(currentResults.length / pageSize));
            currentPage = Math.min(Math.max(1, currentPage), totalPages);
            const startIndex = (currentPage - 1) * pageSize;
            const displayResults = currentResults.slice(startIndex, startIndex + pageSize);
            resultsDiv.setAttribute('aria-label', `查詢結果：共 ${currentResults.length} 條，第 ${currentPage} 頁，共 ${totalPages} 頁`);

            resultsDiv.appendChild(createPaginationBar(currentResults.length, 'top'));

            const fragment = document.createDocumentFragment();
            displayResults.forEach((item, idx) => fragment.appendChild(renderResultCard(item, idx)));
            resultsDiv.appendChild(fragment);

            if (currentResults.length > pageSize) {
                resultsDiv.appendChild(createPaginationBar(currentResults.length, 'bottom'));

                document.querySelector('.search-container')?.scrollIntoView({ behavior: 'smooth', block: 'start' });

        function goToPage(page) {
            const totalPages = Math.max(1, Math.ceil(currentResults.length / pageSize));
            const nextPage = Math.min(Math.max(1, parseInt(page, 10) || 1), totalPages);
            if (nextPage === currentPage) return;

        function searchDict(updateUrl = true) {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');
            const regexErrorDiv = document.getElementById('regexError');
            const mode = document.querySelector('input[name="searchMode"]:checked').value;

            currentQuery = query;
            currentMode = mode;
            currentResults = [];
            currentPage = updateUrl ? 1 : pendingUrlPage;

            resultsDiv.replaceChildren();
            regexErrorDiv.style.display = 'none';
            regexErrorDiv.textContent = '';
            if (!query) {
                if (updateUrl) updateSearchUrl();
                return;
            }

            let isRegexMode = mode === 'regex' || (query.startsWith('/') && query.endsWith('/') && query.length > 2);
            let isExactMode = mode === 'exact' || (query.startsWith('"') && query.endsWith('"') && query.length > 2);
            let regex = null;
            let exactStr = "";

            if (isRegexMode) {
                let regexStr = query;
                let flags = "";
                const match = query.match(/^\/(.+)\/([gimsuy]*)$/);
                if (match) {
                    regexStr = match[1];
                    flags = match[2];
                }
                const result = safeRegex(regexStr, flags);
                if (!result.ok) {
                    regexErrorDiv.textContent = result.msg;
                    regexErrorDiv.style.display = 'block';
                    return;
                }
                regex = result.regex;
            }

            if (isExactMode) {
                exactStr = (query.startsWith('"') && query.endsWith('"')) ? query.slice(1, -1) : query;
            }

            let results;

            if (mode === 'default' && !isRegexMode && !isExactMode) {
                let tokens = [];
                const parts = query.split(/\s+/);
                for (let p of parts) {
                    if (!p) continue;
                    const matches = p.match(/[\u4E00-\u9FFF\u3400-\u4DBF]+|[^ \u4E00-\u9FFF\u3400-\u4DBF]+/g);
                    if (matches) {
                        matches.forEach(match => {
                            if (/[\u4E00-\u9FFF\u3400-\u4DBF]/.test(match)) {
                                tokens.push(...match.split(''));
                            } else {
                                tokens.push(match);
                            }
                        });
                    }
                }
                if (tokens.length === 0) tokens = [query];
                const parsedTokens = tokens.map(t => ({ val: t, isUpper: /^[A-Z0-9]+$/.test(t), isHan: /[\u4E00-\u9FFF\u3400-\u4DBF]/.test(t) }));

                results = [];
                const seen = new Set();

                parsedTokens.forEach(token => {
                    appendUnique(results, seen, zIndex.get(token.val));
                    appendUnique(results, seen, pinyinIndex.get(token.val));
                    appendUnique(results, seen, phoneticIndex.get(token.val));
                    appendUnique(results, seen, domainExactIndex.get(token.val));

                    if (token.isUpper) {
                        for (const [domain, items] of domainExactIndex) {
                            if (domain.includes(token.val)) appendUnique(results, seen, items);
                        }
                    }

                    // 對拼音與擬音保留原本的「包含」檢索能力；漢字 token 則不再做無效全表掃描。
                    if (!token.isHan) {
                        dictData.forEach(item => {
                            if (!seen.has(item) && ((item.y && item.y.includes(token.val)) || (item.p && item.p.includes(token.val)))) {
                                seen.add(item);
                                results.push(item);
                            }
                        });
                    }
                });
            } else if (mode === 'meaning') {
                if (query.length > 0 && meaningIndex.has(query[0])) {
                    const candidateIndices = Array.from(meaningIndex.get(query[0]));
                    results = candidateIndices.map(i => dictData[i]).filter(item => {
                        const inMeaning = item.d?.[1]?.some(m => m.includes(query));
                        const inEtym    = item.e?.includes(query);
                        const inNote    = item.n?.includes(query);
                        return inMeaning || inEtym || inNote;
                    });
                } else {
                    results = [];
                }
            } else {
                if (isRegexMode && regex) {
                    results = dictData.filter(item => regexMatches(regex, item.z, item.y, item.p, item.a));
                } else if (isExactMode) {
                    const seen = new Set();
                    results = [];
                    appendUnique(results, seen, zIndex.get(exactStr));
                    appendUnique(results, seen, pinyinIndex.get(exactStr));
                    appendUnique(results, seen, phoneticIndex.get(exactStr));
                    appendUnique(results, seen, domainExactIndex.get(exactStr));
                } else {
                    results = [];
                }
            }

            currentResults = results;
            renderPaginatedResults(updateUrl);
        }
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        let hadController = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.register('sw.js', { scope: './' }).catch(() => {});
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (hadController) showUpdateNotification();
            hadController = true;
        });
      });
    }
    </script>
</body>
