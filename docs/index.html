<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上古漢語字典查詢</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1c1a17; --ink-soft: #4a4540; --ink-faint: #8a837a;
            --paper: #f7f3ee; --paper-card: #fdfaf6; --paper-inset: #f0ebe3;
            --vermilion: #c0392b; --vermilion-light: #f5e6e4;
            --indigo: #2c3e6b; --indigo-light: #e8ecf5;
            --gold: #8b6914; --gold-light: #f5eed8;
            --border: #d6cfc5; --border-light: #e8e2d8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Noto Serif TC", "PingFang TC", "STSong", serif; background-color: var(--paper);
            color: var(--ink); max-width: 820px; margin: 0 auto; padding: 32px 24px; line-height: 1.8;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='60' height='60' fill='%23f7f3ee'/%3E%3Crect x='0' y='29.5' width='60' height='1' fill='%23e8e2d8' opacity='0.5'/%3E%3Crect x='29.5' y='0' width='1' height='60' fill='%23e8e2d8' opacity='0.5'/%3E%3C/svg%3E");
        }
        .page-header { text-align: center; margin-bottom: 36px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
        .page-header::after { content: ''; display: block; width: 60px; height: 2px; background: var(--vermilion); margin: 12px auto 0; }
        .page-header h1 { font-size: 26px; font-weight: 500; letter-spacing: 0.15em; color: var(--indigo); }
        .search-container { position: sticky; top: 0; background: var(--paper); padding: 12px 0 16px; z-index: 100; margin-bottom: 12px; }
        .search-box { display: flex; border: 1.5px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--paper-card); box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: border-color 0.2s, box-shadow 0.2s; }
        .search-box:focus-within { border-color: var(--indigo); box-shadow: 0 2px 16px rgba(44,62,107,0.12); }
        .search-options { display: flex; gap: 10px; margin-top: 14px; justify-content: center; flex-wrap: wrap; }
        .radio-label { cursor: pointer; display: inline-flex; }
        .radio-label input { display: none; }
        .radio-btn { padding: 6px 18px; font-size: 13px; font-weight: 500; border: 1.5px solid var(--border); border-radius: 20px; color: var(--ink-soft); transition: all 0.2s ease; background: var(--paper-card); letter-spacing: 0.05em; }
        .radio-label:hover .radio-btn { border-color: var(--indigo-light); color: var(--indigo); }
        .radio-label input:checked + .radio-btn { background: var(--indigo); color: #fff; border-color: var(--indigo); box-shadow: 0 2px 8px rgba(44,62,107,0.2); }
        input[type="text"] { flex: 1; padding: 13px 16px; font-size: 15px; font-family: inherit; border: none; background: transparent; outline: none; color: var(--ink); }
        input[type="text"]::placeholder { color: var(--ink-faint); }
        button { padding: 13px 24px; font-size: 14px; font-family: inherit; letter-spacing: 0.1em; cursor: pointer; background: var(--indigo); color: #fff; border: none; transition: background 0.2s; }
        button:hover { background: #1e2b4e; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        #extraStatus { text-align: center; font-size: 13px; color: var(--gold); margin-bottom: 24px; display: none; }
        .result-card { background: var(--paper-card); margin-bottom: 28px; border-radius: 4px; border: 1px solid var(--border); box-shadow: 0 3px 20px rgba(0,0,0,0.05); overflow: hidden; animation: fadeUp 0.3s ease both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .char-banner { background: var(--indigo); color: #fff; padding: 20px 28px; display: flex; align-items: center; gap: 24px; }
        .char-glyph { font-size: 64px; font-weight: 700; line-height: 1; color: #fff; flex-shrink: 0; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .char-phonetics { flex: 1; }
        .phonetic-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .phonetic-label { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; width: 28px; flex-shrink: 0; }
        .phonetic-value { font-family: "Noto Sans Mono", monospace; font-size: 18px; color: #f0c27f; letter-spacing: 0.05em; }
        .pinyin-value { font-family: "Noto Sans Mono", monospace; font-size: 14px; color: rgba(255,255,255,0.75); letter-spacing: 0.05em; }
        .char-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 2px; font-size: 11px; letter-spacing: 0.06em; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); border: 1px solid rgba(255,255,255,0.25); }

        /* 諧聲域專屬 Tag 樣式 */
        .xiesheng-tag { background: rgba(240, 194, 127, 0.2); color: #f0c27f; border-color: rgba(240, 194, 127, 0.4); cursor: pointer; transition: all 0.2s; }
        .xiesheng-tag:hover { background: rgba(240, 194, 127, 0.4); transform: translateY(-1px); }

        .freq-strip { background: var(--indigo-light); border-bottom: 1px solid var(--border-light); padding: 10px 28px; display: flex; gap: 28px; flex-wrap: wrap; }
        .freq-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink-soft); }
        .freq-label { color: var(--ink-faint); }
        .freq-num { font-family: "Noto Sans Mono", monospace; font-size: 13px; color: var(--indigo); font-weight: 500; }
        .freq-bar-wrap { width: 60px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .freq-bar { height: 100%; background: var(--indigo); border-radius: 3px; opacity: 0.45; }
        .card-body { padding: 22px 28px; }
        .section { margin-bottom: 20px; }
        .section:last-child { margin-bottom: 0; }
        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .section-icon { width: 20px; height: 20px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; font-weight: 700; }
        .section-title { font-size: 13px; font-weight: 500; letter-spacing: 0.1em; color: var(--ink-soft); }
        .section-note { font-size: 12px; color: var(--ink-faint); margin-left: 4px; }
        .section-divider { height: 1px; background: var(--border-light); margin: 20px 0; }
        .meanings-list { list-style: none; counter-reset: sense; }
        .meanings-list li { counter-increment: sense; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; font-size: 14.5px; line-height: 1.9; color: var(--ink); }
        .meanings-list li:last-child { margin-bottom: 0; }
        .meanings-list li::before { content: counter(sense); min-width: 22px; height: 22px; background: var(--vermilion); color: #fff; border-radius: 50%; font-size: 11px; font-family: "Noto Sans Mono", monospace; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 3px; }
        .text-block { background: var(--paper-inset); border: 1px solid var(--border-light); border-left: 3px solid var(--border); border-radius: 0 3px 3px 0; padding: 12px 16px; font-size: 13.5px; line-height: 1.9; color: var(--ink-soft); white-space: pre-wrap; }
        .text-block.annotation { border-left-color: var(--gold); background: var(--gold-light); }
        .text-block.etymology { border-left-color: var(--vermilion); background: var(--vermilion-light); }
        .no-result { text-align: center; padding: 48px 0; color: var(--ink-faint); font-size: 15px; letter-spacing: 0.05em; }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>
            <a href="https://zhuanlan.zhihu.com/p/12987993957" target="_blank" style="color: inherit; text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='var(--vermilion)'" onmouseout="this.style.color='inherit'">
                新最小上古漢語（NOCM）查詢
            </a>
        </h1>
    </div>
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="正在加載字庫…" onkeypress="handleEnter(event)" disabled>
            <button id="searchBtn" onclick="searchDict()" disabled>查詢</button>
        </div>
        <div class="search-options">
            <label class="radio-label">
                <input type="radio" name="searchMode" value="default" checked>
                <span class="radio-btn">默認</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="searchMode" value="exact">
                <span class="radio-btn">精確</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="searchMode" value="regex">
                <span class="radio-btn">正則</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="searchMode" value="meaning">
                <span class="radio-btn">釋義反查</span>
            </label>
        </div>
    </div>
    <div id="extraStatus"></div>
    <div id="results"></div>

    <script>
        let dictData = [];
        let maxTotal = 1;
        let maxZhou = 1;

        // 通用下載與流式解壓函數
        async function fetchGzJson(url, progressCallback) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`請求 ${url} 失敗`);
            const contentLength = response.headers.get('content-length');
            const total = contentLength ? parseInt(contentLength, 10) : 0;
            let loaded = 0;

            const progressStream = new TransformStream({
                transform(chunk, controller) {
                    loaded += chunk.byteLength;
                    if (progressCallback) progressCallback(loaded, total);
                    controller.enqueue(chunk);
                }
            });

            const decompressedStream = response.body
                .pipeThrough(progressStream)
                .pipeThrough(new DecompressionStream('gzip'))
                .pipeThrough(new TextDecoderStream());

            const reader = decompressedStream.getReader();
            let jsonText = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                jsonText += value;
            }
            return JSON.parse(jsonText);
        }

        async function initDictionary() {
            const input = document.getElementById('searchInput');
            const btn = document.getElementById('searchBtn');
            const status = document.getElementById('extraStatus');

            try {
                dictData = await fetchGzJson('base.json.gz', (loaded, total) => {
                    const pct = total ? Math.round((loaded / total) * 100) + '%' : (loaded / 1024 / 1024).toFixed(2) + ' MB';
                    input.placeholder = `加載基礎字庫... ${pct}`;
                });

                input.placeholder = `已加載${dictData.length}字 — 請輸入關鍵字`;
                input.disabled = false;
                btn.disabled = false;
                input.focus();

                status.style.display = 'block';
                const extraData = await fetchGzJson('extra.json.gz', (loaded, total) => {
                    const pct = total ? Math.round((loaded / total) * 100) + '%' : (loaded / 1024 / 1024).toFixed(2) + ' MB';
                    status.innerText = `獲取釋義與注釋... ${pct}`;
                });

                extraData.forEach((ext, i) => { Object.assign(dictData[i], ext); });

                maxTotal = Math.max(...dictData.map(item => item.c || 0));
                maxZhou = Math.max(...dictData.map(item => item.x || 0));

                status.innerText = '擴展數據加載完成！';
                setTimeout(() => { status.style.display = 'none'; }, 2000);

                // 加載期間搜了東西，加載完自動刷新渲染注釋
                if (input.value.trim()) searchDict();

            } catch (error) {
                console.error('加載錯誤:', error);
                input.placeholder = '加載字典失敗，請檢查網絡';
            }
        }

        initDictionary();

        function handleEnter(e) { if (e.key === 'Enter') searchDict(); }

        function freqItem(label, val, max) {
            if (!val && val !== 0) return '';
            const pct = Math.min(100, (parseFloat(val) / max) * 100);
            return `<div class="freq-item"><span class="freq-label">${label}</span><span class="freq-num">${val}</span><div class="freq-bar-wrap"><div class="freq-bar" style="width:${pct}%"></div></div></div>`;
        }

        function searchByDomain(domain) {
            document.getElementById('searchInput').value = domain;
            // 自動幫使用者切換到「精確」搜尋模式
            document.querySelector('input[name="searchMode"][value="exact"]').checked = true;
            searchDict();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function searchDict() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');
            const mode = document.querySelector('input[name="searchMode"]:checked').value;

            resultsDiv.innerHTML = '';
            if (!query) return;

            let isRegexMode = mode === 'regex' || (query.startsWith('/') && query.endsWith('/') && query.length > 2);
            let isExactMode = mode === 'exact' || (query.startsWith('"') && query.endsWith('"') && query.length > 2);
            let regex = null;
            let exactStr = "";

            if (isRegexMode) {
                let regexStr = query;
                if (query.startsWith('/') && query.endsWith('/')) regexStr = query.slice(1, -1);
                try { regex = new RegExp(regexStr); } catch(e) { isRegexMode = false; }
            }

            if (isExactMode) {
                exactStr = (query.startsWith('"') && query.endsWith('"')) ? query.slice(1, -1) : query;
            }

            let results = [];

            // 如果是「默認模式」且沒有使用正則/精確的快捷語法，啟動「長文注音/分詞」邏輯
            if (mode === 'default' && !isRegexMode && !isExactMode) {
                let tokens = [];
                // 先用空格將字串切開
                const parts = query.split(/\s+/);
                for (let p of parts) {
                    if (!p) continue;
                    // 如果這一個區塊包含漢字，就逐字拆解（自動過濾掉標點符號）
                    if (/[\u4E00-\u9FFF\u3400-\u4DBF]/.test(p)) {
                        for (let ch of p) {
                            if (/[\u4E00-\u9FFF\u3400-\u4DBF]/.test(ch)) {
                                tokens.push(ch);
                            }
                        }
                    } else {
                        // 否則視為完整的拼音、擬音或諧聲域（如 wang, m.ru[g]s, A1）
                        tokens.push(p);
                    }
                }

                // 防呆：如果拆解後是空的（例如只輸入了一堆逗號），退回原字串查詢
                if (tokens.length === 0) tokens = [query];

                // 依序查詢每個 Token 並合併結果（沒查到的自動忽略）
                tokens.forEach(token => {
                    let isUpperDomain = /^[A-Z0-9]+$/.test(token);
                    let tokenResults = dictData.filter(item => {
                        const inChar = item.z === token;
                        const inPhonetic = item.y && item.y.includes(token);
                        const inPinyin = item.p && item.p.includes(token);
                        const inDomain = (isUpperDomain && item.a && item.a.includes(token)) || item.a === token;
                        return inChar || inPhonetic || inPinyin || inDomain;
                    });
                    results = results.concat(tokenResults);
                });
            } else {
                // 非默認模式（釋義反查、正則、精確），使用全局比對
                results = dictData.filter(item => {
                    if (mode === 'meaning') {
                        const inMeaning = item.d && item.d[1] && item.d[1].some(m => m.includes(query));
                        const inEtym = item.e && item.e.includes(query);
                        const inNote = item.n && item.n.includes(query);
                        return inMeaning || inEtym || inNote;
                    }
                    if (isRegexMode && regex) {
                        return regex.test(item.z) || regex.test(item.y) || regex.test(item.p) || regex.test(item.a);
                    }
                    if (isExactMode) {
                        return item.z === exactStr || item.y === exactStr || item.p === exactStr || item.a === exactStr;
                    }
                    return false;
                });
            }

            if (results.length === 0) {
                resultsDiv.innerHTML = `<div class="no-result">未找到「${query}」的相關字條</div>`;
                return;
            }

            // 數量限制與防卡死提示（長文模式放寬到 150 條）
            const MAX_RESULTS = 150;
            let displayResults = results;

            if (results.length > MAX_RESULTS) {
                displayResults = results.slice(0, MAX_RESULTS);
                const warningMsg = document.createElement('div');
                warningMsg.style.cssText = "text-align: center; margin-bottom: 24px; padding: 12px; background: var(--gold-light); color: var(--gold); border: 1px solid rgba(139, 105, 20, 0.2); border-radius: 4px; font-size: 13.5px; letter-spacing: 0.05em;";
                warningMsg.innerHTML = `找到 <b>${results.length}</b> 條結果。為避免瀏覽器卡頓，僅顯示前 <b>${MAX_RESULTS}</b> 條。`;
                resultsDiv.appendChild(warningMsg);
            }

            // 渲染卡片邏輯
            displayResults.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.style.animationDelay = (idx * 0.06) + 's';

                let tags = '';
                if (item.a) tags += `<span class="tag xiesheng-tag" onclick="searchByDomain('${item.a}')" title="點擊查找同諧聲域字">諧聲域: ${item.a}</span>`;
                if (item.s === 1) tags += `<span class="tag">見詩經韻</span>`;
                if (item.q === 1) tags += `<span class="tag">見戰國韻</span>`;

                let meaningsHtml = '<p style="color:var(--ink-faint);font-style:italic;font-size:14px;">暫無釋義</p>';
                let meaningNote = '';
                if (item.d && item.d[1] && item.d[1].length > 0) {
                    meaningNote = item.d[0] ? `<span class="section-note">（${item.d[0]}）</span>` : '';
                    meaningsHtml = `<ol class="meanings-list">${item.d[1].map(m => `<li><span>${m}</span></li>`).join('')}</ol>`;
                }

                const calcNorm = (val, max) => val ? (100 * Math.sqrt(val / max)).toFixed(2) : null;
                const normTotal = calcNorm(item.c, maxTotal);
                const normZhou = calcNorm(item.x, maxZhou);

                const freqHtml = [
                    freqItem('總出現', item.c, maxTotal),
                    freqItem('先秦歸一', normTotal, 100),
                    freqItem('見西周', item.x, maxZhou),
                    freqItem('西周歸一', normZhou, 100),
                ].filter(Boolean).join('');

                card.innerHTML = `
                    <div class="char-banner">
                        <div class="char-glyph">${item.z || '？'}</div>
                        <div class="char-phonetics">
                            <div class="phonetic-row"><span class="phonetic-label">擬音</span><span class="phonetic-value">${item.y || '—'}</span></div>
                            <div class="phonetic-row"><span class="phonetic-label">拼音</span><span class="pinyin-value">${item.p || '—'}</span></div>
                            ${tags ? `<div class="char-tags">${tags}</div>` : ''}
                        </div>
                    </div>
                    ${freqHtml ? `<div class="freq-strip">${freqHtml}</div>` : ''}
                    <div class="card-body">
                        <div class="section">
                            <div class="section-header">
                                <div class="section-icon" style="background:var(--vermilion-light);color:var(--vermilion);">義</div>
                                <span class="section-title">釋義</span>${meaningNote}
                            </div>
                            ${meaningsHtml}
                        </div>
                        ${item.e ? `
                        <div class="section-divider"></div>
                        <div class="section">
                            <div class="section-header">
                                <div class="section-icon" style="background:var(--vermilion-light);color:var(--vermilion);">源</div>
                                <span class="section-title">
                                    <a href="https://zi.tools/zi/${item.z}" target="_blank" style="color:inherit; text-decoration:none; border-bottom: 1px dashed var(--ink-faint); transition: all 0.2s;" onmouseover="this.style.color='var(--vermilion)'; this.style.borderBottomColor='var(--vermilion)';" onmouseout="this.style.color='inherit'; this.style.borderBottomColor='var(--ink-faint)';">字源諸說 (zi.tools)</a>
                                </span>
                            </div>
                            <div class="text-block etymology">${item.e}</div>
                        </div>` : ''}
                        ${item.n ? `
                        <div class="section-divider"></div>
                        <div class="section">
                            <div class="section-header">
                                <div class="section-icon" style="background:var(--gold-light);color:var(--gold);">注</div>
                                <span class="section-title">注釋</span>
                            </div>
                            <div class="text-block annotation">${item.n}</div>
                        </div>` : ''}
                    </div>`;
                resultsDiv.appendChild(card);
            });

            if (results.length > MAX_RESULTS) {
                const bottomMsg = document.createElement('div');
                bottomMsg.style.cssText = "text-align: center; margin-top: 10px; color: var(--ink-faint); font-size: 13px;";
                bottomMsg.innerText = `— 後面還有 ${results.length - MAX_RESULTS} 條結果已省略 —`;
                resultsDiv.appendChild(bottomMsg);
            }
        }
    </script>
</body>
</html>
